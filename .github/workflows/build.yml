name: Build

on:
  push:
    branches: [main]      # change to "master" if that's your default branch
  workflow_dispatch:       # lets you run it manually from the Actions tab

permissions:
  contents: write          # required so the job can push the built file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Commit built bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-entities.js
          git diff --staged --quiet || git commit -m "build: auto-entities.js [skip ci]"
          git push
